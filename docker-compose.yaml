
# docker-compose.yaml

name: lanbench
services:
  app:
    image: ${LANBENCH_IMAGE:-andcarde/lanbench:latest}
    build: .
    container_name: app
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      # Runtime DB connection (read by config.js + Prisma adapter)
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: lanbench
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: lanbench
      # Prisma CLI connection (read by prisma.config.ts for db push / studio)
      DATABASE_URL: mysql://lanbench:${DB_PASSWORD}@db:3306/lanbench
      SESSION_SECRET: ${SESSION_SECRET}
      SESSION_COOKIE_SECURE: "false"
      MODEL: ${MODEL:-cloud}
      GROQ_API_KEY: ${GROQ_API_KEY}
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: mariadb:11
    container_name: db
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MARIADB_DATABASE: lanbench
      MARIADB_USER: lanbench
      MARIADB_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mariadb_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -uroot -p\"$$MARIADB_ROOT_PASSWORD\" --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  adminer:
    image: adminer
    container_name: adminer
    ports:
      - "8080:8080"
    depends_on:
      - db
    restart: unless-stopped

volumes:
  mariadb_data:
