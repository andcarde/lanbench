
# docker-compose-2.yaml

# Second, parallel stack for testing the sandbox (agent's) build alongside the
# untouched original `lanbench` stack. Project name "lanbench-2" keeps its
# network and DB volume (lanbench-2_mariadb_data) fully separate.
# Ports are shifted by +1: app 3001, db 3307, adminer 8081.
name: lanbench-2

services:
  app:
    build: .                # built from THIS sandbox repo = the agent's code
    container_name: app-2
    ports:
      - "3001:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: db           # service name (DNS alias) — resolves to db-2 in this network
      DB_PORT: 3306
      DB_USER: lanbench
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: lanbench
      DATABASE_URL: mysql://lanbench:${DB_PASSWORD}@db:3306/lanbench
      SESSION_SECRET: ${SESSION_SECRET}
      SESSION_COOKIE_SECURE: "false"
      MODEL: ${MODEL:-cloud}
      GROQ_API_KEY: ${GROQ_API_KEY}
    volumes:
      - ./uploads-2:/app/uploads   # separate from app-1's ./uploads
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: mariadb:11
    container_name: db-2
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MARIADB_DATABASE: lanbench
      MARIADB_USER: lanbench
      MARIADB_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mariadb_data:/var/lib/mysql   # -> lanbench-2_mariadb_data (separate volume)
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -uroot -p\"$$MARIADB_ROOT_PASSWORD\" --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  adminer:
    image: adminer
    container_name: adminer-2
    ports:
      - "8081:8080"
    depends_on:
      - db
    restart: unless-stopped

volumes:
  mariadb_data:
