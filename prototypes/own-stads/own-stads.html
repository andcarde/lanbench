<!doctype html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Mis estadísticas · LanBench (prototipo)</title>
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
            crossorigin="anonymous"
        />
        <link rel="stylesheet" href="css/own-stads.css" />
    </head>
    <body>
        <!-- Static top bar (prototype): mirrors the app toolbar look without
             depending on /api/session/me, so the page works over file://. -->
        <header class="proto-toolbar">
            <div class="proto-toolbar-inner">
                <span class="proto-toolbar-brand">Lanbench</span>
                <div class="proto-toolbar-actions">
                    <span class="proto-toolbar-badge">mis estadísticas</span>
                    <span class="proto-toolbar-flag">prototipo · front-mock</span>
                </div>
            </div>
        </header>

        <main class="container py-4">
            <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-3">
                <div>
                    <h1 class="h3 mb-1">Mis estadísticas</h1>
                    <p class="text-muted small mb-0">
                        Tu actividad de <strong>anotación</strong> y <strong>revisión</strong>:
                        totales y tiempos medios, en general y por dataset.
                        <span id="statsUser" class="fw-semibold"></span>
                    </p>
                </div>
                <button id="btnRefreshStats" class="btn btn-sm btn-outline-secondary">
                    Actualizar
                </button>
            </div>

            <p id="statsStatus" class="text-muted small"></p>

            <div id="statsCards" class="row g-3"></div>

            <div class="card shadow-sm mt-3">
                <div class="card-header">
                    <h2 class="h6 mb-0">Por dataset</h2>
                    <span class="text-muted small">Solo datasets con alguna anotación o revisión</span>
                </div>
                <div class="card-body">
                    <div id="statsByDataset"></div>
                </div>
            </div>
        </main>

        <!-- =================================================================
             ACTION MODULE — both twins expose window.OwnStadsActions.
             ACTIVE: front-mock (manual testing, no backend).
             ================================================================= -->
        <script src="js/actions/own-stads-actions.mock.js"></script>
        <!-- REAL (decoupled): swap the line above for the one below to point at
             /api/me/stats — needs the running app and a logged-in user.
        <script src="js/actions/own-stads-actions.real.js"></script>
        -->

        <script src="js/own-stads.js"></script>
    </body>
</html>
