<!doctype html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Revisión · LanBench (prototipo)</title>
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
            crossorigin="anonymous"
        />
        <link rel="stylesheet" href="css/reviewer.css" />
    </head>
    <body>
        <!-- Static top bar (prototype): mirrors the app toolbar look without
             depending on /api/session/me, so the page works over file://. -->
        <header class="proto-toolbar">
            <div class="proto-toolbar-inner">
                <span class="proto-toolbar-brand">Lanbench</span>
                <div class="proto-toolbar-actions">
                    <span class="proto-toolbar-badge" data-role="moderator">moderator</span>
                    <span class="proto-toolbar-flag">prototipo · front-mock</span>
                </div>
            </div>
        </header>

        <main class="container py-4">
            <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-3">
                <div>
                    <h1 class="h3 mb-1">Revisión de anotaciones</h1>
                    <p id="scopeHint" class="text-muted small mb-0"></p>
                </div>
                <div class="d-flex flex-wrap align-items-center gap-2">
                    <span id="reviewAnnotator" class="proto-annotator small text-muted"></span>
                    <span id="expiryBadge" class="proto-expiry-badge d-none"></span>
                    <button id="btnRequestReview" class="btn btn-primary">
                        Solicitar siguiente revisión
                    </button>
                </div>
            </div>

            <section id="viewQueue">
                <!-- Remaining panel: only the Triples RDF of the entry. -->
                <div id="entryPanel" class="card shadow-sm mb-3 d-none">
                    <div class="card-body">
                        <div id="entryTriples" class="proto-entry-triples"></div>
                    </div>
                </div>

                <div id="reviewEmpty" class="proto-empty text-center text-muted py-5">
                    <p class="mb-1 fs-5">No hay ninguna revisión activa.</p>
                    <p class="mb-0">Solicita la siguiente revisión para comenzar.</p>
                </div>

                <div id="reviewWorkspace" class="row g-3 d-none">
                    <!-- Annotated sentences: EN reference above each phrase, alerts below -->
                    <div class="col-lg-6">
                        <div class="card shadow-sm h-100">
                            <div class="card-header d-flex justify-content-between align-items-center">
                                <h2 class="h6 mb-0">Frases anotadas</h2>
                                <span class="text-muted small">Haz clic para evaluar</span>
                            </div>
                            <div class="card-body">
                                <div id="reviewSentences" class="reviewer-sentences"></div>
                            </div>
                        </div>
                    </div>

                    <!-- Sequential criteria wizard -->
                    <div class="col-lg-6">
                        <div class="card shadow-sm h-100">
                            <div class="card-header d-flex justify-content-between align-items-center">
                                <h2 class="h6 mb-0">Criterios de calidad</h2>
                                <span id="criteriaProgress" class="badge text-bg-secondary">0 / 0</span>
                            </div>
                            <div class="card-body d-flex flex-column">
                                <div id="reviewCriteria" class="reviewer-criteria flex-grow-1"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
        </main>

        <script
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
            crossorigin="anonymous"
        ></script>

        <!-- =================================================================
             ACTION MODULE — both twins expose window.ReviewerActions.
             ACTIVE: front-mock (manual testing, no backend).
             ================================================================= -->
        <script src="js/actions/reviewer-actions.mock.js"></script>
        <!-- REAL (decoupled): swap the line above for the one below to point at
             /api/reviews/* — needs the running app and a logged-in reviewer.
        <script src="js/actions/reviewer-actions.real.js"></script>
        -->

        <script src="js/reviewer.js"></script>
    </body>
</html>
