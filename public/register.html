<!doctype html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Lanbench - Register</title>
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="css/register.css" />
        <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
        <script src="js/register.js"></script>
    </head>
    <body class="bg-light">
        <div class="container d-flex justify-content-center align-items-center min-vh-100">
            <div class="card shadow-sm border-0 register-card">
                <div class="card-body p-5">
                    <div class="text-center mb-4">
                        <h1 class="h3 mb-2 text-primary">Lanbench</h1>
                        <p class="text-muted">Create your account to continue.</p>
                    </div>

                    <div class="alert alert-danger d-none" id="registerError" role="alert"></div>

                    <form id="registerForm" novalidate>
                        <div class="mb-3">
                            <label for="surname" class="form-label">Surname</label>
                            <input
                                type="text"
                                class="form-control register-input"
                                id="surname"
                                placeholder="Enter your surname"
                                maxlength="64"
                                required
                            />
                        </div>

                        <div class="mb-3">
                            <label for="lastName" class="form-label">Last name</label>
                            <input
                                type="text"
                                class="form-control register-input"
                                id="lastName"
                                placeholder="Enter your last name"
                                maxlength="64"
                                required
                            />
                        </div>

                        <div class="mb-3">
                            <label for="email" class="form-label">Email</label>
                            <input
                                type="email"
                                class="form-control register-input"
                                id="email"
                                placeholder="Enter your email"
                                maxlength="128"
                                required
                            />
                        </div>

                        <div class="mb-3">
                            <label for="password" class="form-label">Password</label>
                            <input
                                type="password"
                                class="form-control register-input"
                                id="password"
                                placeholder="Enter your password"
                                maxlength="64"
                                required
                            />
                        </div>

                        <div class="mb-4">
                            <label for="repeatPassword" class="form-label"
                                >Repeat password</label
                            >
                            <input
                                type="password"
                                class="form-control register-input"
                                id="repeatPassword"
                                placeholder="Repeat your password"
                                maxlength="64"
                                required
                            />
                        </div>

                        <button type="submit" class="btn btn-primary w-100 mb-3">
                            Register
                        </button>
                    </form>

                    <div class="text-center">
                        <span class="text-muted">Already have an account?</span>
                        <a class="btn btn-link p-0 ms-1" href="/login">Login</a>
                    </div>
                </div>
            </div>
        </div>

        <div class="toast-container position-fixed bottom-0 end-0 p-3">
            <div
                id="registerToast"
                class="toast align-items-center text-bg-dark border-0"
                role="alert"
                aria-live="assertive"
                aria-atomic="true"
            >
                <div class="d-flex">
                    <div class="toast-body" id="toastMessage">
                        Register completed.
                    </div>
                    <button
                        type="button"
                        class="btn-close btn-close-white me-2 m-auto"
                        data-bs-dismiss="toast"
                        aria-label="Close"
                    ></button>
                </div>
            </div>
        </div>
    </body>
</html>
