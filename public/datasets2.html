<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lista de datasets</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="css/datasets2.css" />
</head>
<body>
  <div class="container-fluid app-wrapper">
    <div class="main-panel">
      <h1 class="page-title">Lista de datasets</h1>

      <div id="datasetsContainer" class="datasets-container">
        <!-- Se rellena dinámicamente -->
      </div>

      <div class="new-dataset-wrapper">
        <button id="btnNuevoDataset" class="btn btn-new-dataset">
          NUEVO DATASET
        </button>
      </div>
    </div>
  </div>

  <!-- Tooltip / popup flotante -->
  <div id="datasetTooltip" class="dataset-tooltip d-none">
    <div class="tooltip-line" id="tooltipTriples"></div>
    <div class="tooltip-line" id="tooltipLanguages"></div>
  </div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="js/datasets2.js"></script>
</body>
