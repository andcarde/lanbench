<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Visualizador de dataset</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="/css/toolbar.css" />
  <link rel="stylesheet" href="/css/dataset-view.css" />
</head>
<body class="dataset-view-page">
  <main class="dataset-view-shell">
    <div class="dataset-view-frame">
      <div class="dataset-view-header">
        <div class="dataset-view-header-main">
          <a
            href="/tasks"
            class="dataset-back-button"
            title="Volver atrás"
            aria-label="Volver atrás"
          >
            <span aria-hidden="true">&#8592;</span>
          </a>

          <div class="dataset-heading">
            <p class="dataset-overline" id="datasetIdentifier">Dataset</p>
            <h1 id="datasetTitle">Visualizador de dataset</h1>
            <p id="datasetSubtitle">Carga del contenido XML del dataset seleccionado.</p>
          </div>
        </div>

        <div class="dataset-mode-pill" id="datasetModePill">
          <span class="dataset-mode-dot" aria-hidden="true"></span>
          <span id="datasetModeLabel">Modo depuración activo</span>
        </div>
      </div>

      <div class="dataset-view-actions">
        <a
          href="/annotations"
          id="openAnnotationsLink"
          class="btn btn-dark btn-lg"
        >Abrir anotación</a>
      </div>

      <section class="dataset-view-card" aria-label="Contenido XML del dataset">
        <div class="dataset-view-card-header">
          <span>Visualización del XML</span>
          <span class="dataset-readonly-badge">Solo lectura</span>
        </div>

        <textarea
          id="datasetXmlViewer"
          class="dataset-xml-viewer is-loading"
          readonly
          spellcheck="false"
        >Preparando el contenido del dataset...</textarea>
      </section>
    </div>
  </main>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/toolbar.js"></script>
  <script src="/js/actions/dataset-view-actions.js"></script>
  <script src="/js/dataset-view.js"></script>
</body>
</html>
