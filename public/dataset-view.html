<!doctype html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Visualizador de dataset</title>

        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
            crossorigin="anonymous"
        />
        <link rel="stylesheet" href="/css/toolbar.css" />
        <link rel="stylesheet" href="/css/dataset-view.css" />
    </head>
    <body class="dataset-view-page">
        <main class="dataset-view-shell">
            <div class="dataset-view-frame">
                <div class="dataset-view-header">
                    <div class="dataset-view-header-main">
                        <a
                            href="/datasets"
                            class="dataset-back-button"
                            title="Volver atrás"
                            aria-label="Volver atrás"
                        >
                            <span aria-hidden="true">&#8592;</span>
                        </a>

                        <div class="dataset-heading">
                            <p class="dataset-overline" id="datasetIdentifier">
                                Dataset
                            </p>
                            <h1 id="datasetTitle">Visualizador de dataset</h1>
                            <p id="datasetSubtitle" class="d-none"></p>
                        </div>
                    </div>
                </div>

                <section
                    class="dataset-view-card"
                    aria-label="Contenido XML del dataset"
                >
                    <div class="dataset-view-card-header">
                        <span>Visualización del XML</span>
                        <div class="dataset-view-card-actions">
                            <button
                                type="button"
                                id="downloadOriginalBtn"
                                class="dataset-download-btn"
                                title="Descargar el XML original"
                            >
                                <svg
                                    class="dataset-download-icon"
                                    width="16"
                                    height="16"
                                    viewBox="0 0 16 16"
                                    fill="currentColor"
                                    aria-hidden="true"
                                >
                                    <path d="M8 1.5a.5.5 0 0 1 .5.5v8.293l2.146-2.147a.5.5 0 0 1 .708.708l-3 3a.5.5 0 0 1-.708 0l-3-3a.5.5 0 1 1 .708-.708L7.5 10.293V2a.5.5 0 0 1 .5-.5z"/>
                                    <path d="M2 13a.5.5 0 0 1 .5-.5h11a.5.5 0 0 1 0 1h-11A.5.5 0 0 1 2 13z"/>
                                </svg>
                                <span>Original</span>
                            </button>
                            <button
                                type="button"
                                id="downloadAnnotatedBtn"
                                class="dataset-download-btn is-disabled"
                                disabled
                                aria-disabled="true"
                                title="Disponible cuando el dataset esté completado al 100%"
                            >
                                <svg
                                    class="dataset-download-icon"
                                    width="16"
                                    height="16"
                                    viewBox="0 0 16 16"
                                    fill="currentColor"
                                    aria-hidden="true"
                                >
                                    <path d="M8 1.5a.5.5 0 0 1 .5.5v8.293l2.146-2.147a.5.5 0 0 1 .708.708l-3 3a.5.5 0 0 1-.708 0l-3-3a.5.5 0 1 1 .708-.708L7.5 10.293V2a.5.5 0 0 1 .5-.5z"/>
                                    <path d="M2 13a.5.5 0 0 1 .5-.5h11a.5.5 0 0 1 0 1h-11A.5.5 0 0 1 2 13z"/>
                                </svg>
                                <span>Extendido</span>
                            </button>
                            <span class="dataset-readonly-badge">Solo lectura</span>
                        </div>
                    </div>

                    <textarea
                        id="datasetXmlViewer"
                        class="dataset-xml-viewer is-loading"
                        readonly
                        spellcheck="false"
                    >
Preparando el contenido del dataset...</textarea
                    >
                </section>
            </div>
        </main>

        <script
            src="https://code.jquery.com/jquery-3.7.1.min.js"
            integrity="sha384-1H217gwSVyLSIfaLxHbE7dRb3v4mYCKbpQvzx0cegeju1MVsGrX5xXxAvs/HgeFs"
            crossorigin="anonymous"
        ></script>
        <script
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
            crossorigin="anonymous"
        ></script>
        <script src="/js/toolbar.js"></script>
        <script src="/js/actions/dataset-view-actions.js"></script>
        <script src="/js/dataset-view.js"></script>
    </body>
</html>
