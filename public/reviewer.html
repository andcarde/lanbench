<!doctype html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Revision · LanBench</title>
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
            crossorigin="anonymous"
        />
        <link rel="stylesheet" href="/css/toolbar.css" />
        <link rel="stylesheet" href="/css/reviewer.css" />
        <script
            src="https://code.jquery.com/jquery-3.7.1.min.js"
            integrity="sha384-1H217gwSVyLSIfaLxHbE7dRb3v4mYCKbpQvzx0cegeju1MVsGrX5xXxAvs/HgeFs"
            crossorigin="anonymous"
        ></script>
        <script
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
            crossorigin="anonymous"
        ></script>
        <script src="/js/toolbar.js"></script>
        <script src="/js/actions/reviewer-actions.js"></script>
        <script src="/js/reviewer.js"></script>
    </head>
    <body>
        <div class="container py-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h1 class="h3 mb-0">Cola de revision</h1>
                <div class="d-flex gap-2">
                    <button id="btnRequestReview" class="btn btn-primary">
                        Solicitar siguiente revision
                    </button>
                    <button
                        id="btnReleaseReview"
                        class="btn btn-outline-secondary"
                    >
                        Liberar revision
                    </button>
                </div>
            </div>
            <p id="reviewStatus" class="text-muted small"></p>

            <div class="row g-3">
                <div class="col-lg-5">
                    <div class="card shadow-sm">
                        <div class="card-body">
                            <h2 class="h5 mb-3">Contexto de la entry</h2>
                            <div id="reviewContext" class="reviewer-context">
                                <p class="text-muted">
                                    Solicita una revision para empezar.
                                </p>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="col-lg-7">
                    <div class="card shadow-sm">
                        <div class="card-body">
                            <h2 class="h5 mb-3">Frases completadas</h2>
                            <div
                                id="reviewSentences"
                                class="reviewer-sentences-review"
                            >
                                <p class="text-muted">Sin revision activa.</p>
                            </div>
                            <button
                                id="btnFinalizeReview"
                                class="btn btn-success mt-3 d-none"
                                disabled
                            >
                                Listo
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </body>
</html>
