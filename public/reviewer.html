<!doctype html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Revisión · LanBench</title>
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
            crossorigin="anonymous"
        />
        <link rel="stylesheet" href="/css/toolbar.css" />
        <link rel="stylesheet" href="/css/reviewer.css" />
        <script src="/js/toolbar.js"></script>
    </head>
    <body>
        <main class="container py-4">
            <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-3">
                <div>
                    <h1 class="h3 mb-1">Revisión de anotaciones</h1>
                    <p id="scopeHint" class="text-muted small mb-0"></p>
                </div>
                <div class="d-flex flex-wrap align-items-center gap-2">
                    <span id="reviewAnnotator" class="reviewer-annotator small text-muted"></span>
                    <span id="expiryBadge" class="reviewer-expiry-badge d-none"></span>
                    <button
                        id="btnReleaseReview"
                        class="btn btn-outline-secondary d-none"
                    >
                        Liberar revisión
                    </button>
                    <button id="btnRequestReview" class="btn btn-primary">
                        Solicitar siguiente revisión
                    </button>
                </div>
            </div>

            <p id="reviewStatus" class="text-muted small reviewer-status"></p>

            <section id="viewQueue">
                <!-- Remaining panel: only the Triples RDF of the entry. -->
                <div id="entryPanel" class="card shadow-sm mb-3 d-none">
                    <div class="card-body">
                        <div id="entryTriples" class="reviewer-entry-triples"></div>
                    </div>
                </div>

                <div id="reviewEmpty" class="reviewer-empty text-center text-muted py-5">
                    <p class="mb-1 fs-5">No hay ninguna revisión activa.</p>
                    <p class="mb-0">Solicita la siguiente revisión para comenzar.</p>
                </div>

                <div id="reviewWorkspace" class="row g-3 d-none">
                    <!-- Annotated sentences: EN reference above each phrase, alerts below -->
                    <div class="col-lg-6">
                        <div class="card shadow-sm h-100">
                            <div class="card-header d-flex justify-content-between align-items-center">
                                <h2 class="h6 mb-0">Frases anotadas</h2>
                                <span class="text-muted small">Haz clic para evaluar</span>
                            </div>
                            <div class="card-body">
                                <div id="reviewSentences" class="reviewer-sentences"></div>
                            </div>
                        </div>
                    </div>

                    <!-- Sequential criteria wizard -->
                    <div class="col-lg-6">
                        <div class="card shadow-sm h-100">
                            <div class="card-header d-flex justify-content-between align-items-center">
                                <h2 class="h6 mb-0">Criterios de calidad</h2>
                                <span id="criteriaProgress" class="badge text-bg-secondary">0 / 0</span>
                            </div>
                            <div class="card-body d-flex flex-column">
                                <div id="reviewCriteria" class="reviewer-criteria flex-grow-1"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
        </main>

        <script
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
            crossorigin="anonymous"
        ></script>

        <!-- Real actions against /api/reviews/* (swapped to the mock by
             `node scripts/front-debug.js`, which moves the front-mocks twin in). -->
        <script src="/js/actions/reviewer-actions.js"></script>
        <script src="/js/reviewer.js"></script>
    </body>
</html>
