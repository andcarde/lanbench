<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>403 - Forbidden</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #f5f5f5;
      color: #1b1b1b;
      font-family: Arial, Helvetica, sans-serif;
    }

    main {
      max-width: 560px;
      margin: 20px;
      padding: 24px;
      background: #ffffff;
      border: 1px solid #d4d4d4;
      text-align: center;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 2rem;
    }

    p {
      margin: 0;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <main>
    <h1>403 - Forbidden</h1>
    <p>No tienes una sesión activa para acceder a este recurso.</p>
  </main>
</body>
</html>
