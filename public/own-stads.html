<!doctype html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Mis estadísticas · LanBench</title>
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
            crossorigin="anonymous"
        />
        <link rel="stylesheet" href="/css/toolbar.css" />
        <link rel="stylesheet" href="/css/own-stads.css" />
        <script src="/js/toolbar.js"></script>
    </head>
    <body>
        <main class="container py-4">
            <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-3">
                <div>
                    <h1 class="h3 mb-1">Mis estadísticas</h1>
                    <p class="text-muted small mb-0">
                        Tu actividad de <strong>anotación</strong> y <strong>revisión</strong>:
                        totales y tiempos medios, en general y por dataset.
                        <span id="statsUser" class="fw-semibold"></span>
                    </p>
                </div>
                <button id="btnRefreshStats" class="btn btn-sm btn-outline-secondary">
                    Actualizar
                </button>
            </div>

            <p id="statsStatus" class="text-muted small"></p>

            <div id="statsCards" class="row g-3"></div>

            <div class="card shadow-sm mt-3">
                <div class="card-header">
                    <h2 class="h6 mb-0">Por dataset</h2>
                    <span class="text-muted small">Solo datasets con alguna anotación o revisión</span>
                </div>
                <div class="card-body">
                    <div id="statsByDataset"></div>
                </div>
            </div>
        </main>

        <!-- Real actions against /api/me/stats (swapped to the mock by
             `node scripts/front-debug.js`, which moves the front-mocks twin in). -->
        <script src="/js/actions/own-stads-actions.js"></script>
        <script src="/js/own-stads.js"></script>
    </body>
</html>
