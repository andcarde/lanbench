<!doctype html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Lanbench - Login</title>
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="css/login.css" />
        <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
        <script src="js/login.js"></script>
    </head>
    <body class="bg-light">
        <div class="container d-flex justify-content-center align-items-center min-vh-100">
            <div class="card shadow-sm border-0 login-card">
                <div class="card-body p-5">
                    <div class="text-center mb-4">
                        <h1 class="h3 mb-2 text-primary">Lanbench</h1>
                        <p class="text-muted">Welcome back! Please log in to continue.</p>
                    </div>
                    <form id="loginForm" novalidate>
                        <div class="mb-3">
                            <label for="email" class="form-label">Email</label>
                            <input
                                type="email"
                                class="form-control login-input"
                                id="email"
                                placeholder="Enter your email"
                                required
                            />
                        </div>
                        <div class="mb-4">
                            <label for="password" class="form-label">Password</label>
                            <input
                                type="password"
                                class="form-control login-input"
                                id="password"
                                placeholder="Enter your password"
                                required
                            />
                        </div>
                        <button type="submit" class="btn btn-primary w-100 mb-3">
                            Login
                        </button>
                    </form>
                    <div class="text-center">
                        <span class="text-muted">Don't have an account?</span>
                        <button class="btn btn-link p-0 ms-1" id="btnRegister">
                            Register
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div class="toast-container position-fixed bottom-0 end-0 p-3">
            <div
                id="loginToast"
                class="toast align-items-center text-bg-dark border-0"
                role="alert"
                aria-live="assertive"
                aria-atomic="true"
            >
                <div class="d-flex">
                    <div class="toast-body" id="toastMessage">
                        Login successful.
                    </div>
                    <button
                        type="button"
                        class="btn-close btn-close-white me-2 m-auto"
                        data-bs-dismiss="toast"
                        aria-label="Close"
                    ></button>
                </div>
            </div>
        </div>
    </body>
</html>
