<!doctype html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Lanbench - Selección de datasets</title>
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="css/datasets.css" />
        <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
        <script src="js/datasets.js"></script>
    </head>
    <body>
        <div class="container py-4">
            <div
                class="d-flex flex-column flex-lg-row justify-content-between align-items-lg-center gap-3 mb-4"
            >
                <div>
                    <h1 class="h3 mb-1">Selección de dataset</h1>
                    <p class="text-muted mb-0">
                        Elige el dataset sobre el que quieres trabajar en esta
                        sesión de anotación.
                    </p>
                </div>
                <div class="summary-badge">
                    <span class="small text-muted">Dataset seleccionado</span>
                    <strong id="selectedDatasetLabel">Ninguno</strong>
                </div>
            </div>

            <div class="card shadow-sm border-0 mb-4">
                <div class="card-body p-4">
                    <div class="row g-3">
                        <div class="col-lg-6">
                            <label for="searchInput" class="form-label"
                                >Buscar</label
                            >
                            <input
                                type="search"
                                class="form-control"
                                id="searchInput"
                                placeholder="Nombre, descripción o fuente..."
                            />
                        </div>
                        <div class="col-lg-3">
                            <label for="statusFilter" class="form-label"
                                >Estado</label
                            >
                            <select class="form-select" id="statusFilter">
                                <option value="all">Todos</option>
                                <option value="ready">Disponible</option>
                                <option value="in_progress">En progreso</option>
                                <option value="blocked">Bloqueado</option>
                            </select>
                        </div>
                        <div class="col-lg-3">
                            <label class="form-label d-block">Totales</label>
                            <div class="d-flex gap-2 flex-wrap">
                                <span class="badge text-bg-primary" id="totalBadge"
                                    >0 datasets</span
                                >
                                <span class="badge text-bg-success" id="readyBadge"
                                    >0 disponibles</span
                                >
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card shadow-sm border-0">
                <div class="card-body p-4">
                    <div id="datasetsList" class="d-grid gap-3"></div>
                    <div class="empty-state d-none" id="emptyState">
                        No hay datasets que coincidan con el filtro aplicado.
                    </div>
                </div>
            </div>
        </div>

        <div class="toast-container position-fixed bottom-0 end-0 p-3">
            <div
                id="actionToast"
                class="toast align-items-center text-bg-dark border-0"
                role="alert"
                aria-live="assertive"
                aria-atomic="true"
            >
                <div class="d-flex">
                    <div class="toast-body" id="toastMessage">
                        Dataset seleccionado.
                    </div>
                    <button
                        type="button"
                        class="btn-close btn-close-white me-2 m-auto"
                        data-bs-dismiss="toast"
                        aria-label="Close"
                    ></button>
                </div>
            </div>
        </div>
    </body>
</html>
