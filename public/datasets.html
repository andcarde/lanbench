<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lista de datasets</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="css/toolbar.css" />
  <link rel="stylesheet" href="css/datasets.css" />
</head>
<body>
  <div class="container-fluid app-wrapper">
    <div class="main-panel">
      <h1 class="page-title">Lista de datasets</h1>

      <div id="datasetsContainer" class="datasets-container">
        <!-- Se rellena dinámicamente -->
      </div>

      <div class="new-dataset-wrapper">
        <button id="btnNuevoDataset" type="button" class="btn btn-new-dataset">
          NUEVO DATASET
        </button>
      </div>
    </div>
  </div>

  <div id="datasetTooltip" class="dataset-tooltip d-none" role="tooltip">
    <div class="tooltip-line tooltip-title" id="tooltipTriples"></div>
    <div class="tooltip-line" id="tooltipLanguages"></div>
  </div>

  <div
    class="modal fade"
    id="datasetSuccessModal"
    tabindex="-1"
    aria-labelledby="datasetSuccessModalLabel"
    aria-hidden="true"
  >
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h2 class="modal-title fs-5" id="datasetSuccessModalLabel">
            Dataset creado
          </h2>
          <button
            type="button"
            class="btn-close"
            data-bs-dismiss="modal"
            aria-label="Cerrar"
          ></button>
        </div>
        <div class="modal-body" id="datasetSuccessMessage"></div>
        <div class="modal-footer">
          <button type="button" class="btn btn-primary" data-bs-dismiss="modal">
            Aceptar
          </button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/toolbar.js"></script>
  <script src="js/datasets.js"></script>
</body>
</html>
